<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Navigator</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-alt: #334155;
      --border: #475569;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --success: #4ade80;
      --error: #f87171;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      line-height: 1.6;
    }
    .header {
      flex-shrink: 0;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .header h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--accent);
    }
    .header p {
      margin: 0.25rem 0 0 0;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.25rem 0.5rem;
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
    }
    .message {
      margin-bottom: 1.25rem;
      display: flex;
      gap: 0.75rem;
    }
    .message.user { flex-direction: row-reverse; }
    .message-avatar {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .message.user .message-avatar { background: var(--accent); color: var(--bg); }
    .message.assistant .message-avatar { background: var(--surface-alt); color: var(--accent); }
    .message-body {
      max-width: 85%;
      padding: 0.75rem 1rem;
      border-radius: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user .message-body {
      background: var(--accent);
      color: var(--bg);
      border-bottom-right-radius: 4px;
    }
    .message.assistant .message-body {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .message-sources {
      margin-top: 0.5rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .message-sources strong { color: var(--text); }
    .feedback-row {
      margin-top: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .feedback-row span { margin-right: 0.25rem; }
    .feedback-btn {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 0.35rem 0.65rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .feedback-btn:hover { border-color: var(--accent); color: var(--accent); }
    .feedback-btn:disabled { opacity: 0.5; cursor: default; }
    .feedback-btn.thanks { border-color: var(--success); color: var(--success); }
    .message-meta {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.35rem;
    }
    .input-area {
      flex-shrink: 0;
      padding: 1rem 1.25rem 1.25rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
    }
    .input-wrap {
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
    }
    .input-wrap textarea {
      flex: 1;
      min-height: 44px;
      max-height: 160px;
      padding: 0.65rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      resize: none;
    }
    .input-wrap textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    .input-wrap textarea::placeholder { color: var(--muted); }
    .send-btn {
      flex-shrink: 0;
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 0.65rem 1.1rem;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95rem;
    }
    .send-btn:hover { filter: brightness(1.1); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .typing {
      padding: 0.5rem 0;
      color: var(--muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>Knowledge Navigator</h1>
    <p>Ask questions over Knowledge Navigator institutional knowledge. Answers are based only on ingested documents.</p>
  </header>

  <main class="chat" id="chat"></main>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="input" placeholder="Ask a question…" rows="1"></textarea>
      <button type="button" class="send-btn" id="sendBtn">Send</button>
    </div>
  </div>

  <script>
    (function () {
      var API = (window.location.origin && window.location.protocol !== "file:") ? window.location.origin : "";
      var chatEl = document.getElementById("chat");
      var inputEl = document.getElementById("input");
      var sendBtn = document.getElementById("sendBtn");
      if (!chatEl || !inputEl || !sendBtn) return;

      var sessionId = sessionStorage.getItem("kn_session_id");
      if (!sessionId) {
        sessionId = (typeof crypto !== "undefined" && typeof crypto.randomUUID === "function")
          ? crypto.randomUUID() : "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/x/g, function () { return (Math.random() * 16 | 0).toString(16); });
        sessionStorage.setItem("kn_session_id", sessionId);
      }

    function escapeHtml(s) {
      if (s == null) return "";
      var div = document.createElement("div");
      div.textContent = s;
      return div.innerHTML;
    }

    function addMessage(role, content, options) {
      if (options == null) options = {};
      var div = document.createElement("div");
      div.className = "message " + role;
      var avatar = role === "user" ? "You" : "Knowledge Navigator";
      var body = '<div class="message-avatar">' + escapeHtml(avatar) + "</div>";
      body += '<div class="message-body">' + escapeHtml(content);
      if (options.sources && options.sources.length) {
        body += '<div class="message-sources"><strong>Source:</strong> ' + escapeHtml(options.sources.join(", ")) + "</div>";
      }
      if (options.latency != null) {
        body += '<div class="message-meta">— ' + options.latency + "s</div>";
      }
      if (role === "assistant" && options.feedbackId != null) {
        body += '<div class="feedback-row"><span>Was this helpful?</span>';
        body += '<button type="button" class="feedback-btn" data-helpful="true" data-id="' + options.feedbackId + '">Yes</button>';
        body += '<button type="button" class="feedback-btn" data-helpful="false" data-id="' + options.feedbackId + '">No</button></div>';
      }
      body += "</div>";
      div.innerHTML = body;
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;

      if (options.feedbackId != null) {
        div.querySelectorAll(".feedback-btn").forEach(function (btn) {
          btn.addEventListener("click", function () {
            var helpful = this.getAttribute("data-helpful") === "true";
            var id = this.getAttribute("data-id");
            sendFeedback(helpful, id, div);
          });
        });
      }
      return div;
    }

    function sendFeedback(helpful, messageId, messageDiv) {
      fetch(API + "/api/metrics/feedback", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ helpful: helpful, session_id: sessionId }),
      }).catch(function () {});

      var row = messageDiv.querySelector(".feedback-row");
      if (row) {
        row.innerHTML = '<span class="feedback-btn thanks">Thanks for your feedback</span>';
      }
    }

    function addTyping() {
      var div = document.createElement("div");
      div.className = "typing";
      div.id = "typingEl";
      div.textContent = "Thinking…";
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
      return div;
    }

    var feedbackCounter = 0;
    function sendMessage() {
      var question = (inputEl.value || "").trim();
      if (!question) return;

      addMessage("user", question);
      inputEl.value = "";
      sendBtn.disabled = true;
      var typingEl = addTyping();

      fetch(API + "/api/query", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question: question, session_id: sessionId }),
        })
        .then(function (r) { return r.json().catch(function () { return {}; }).then(function (data) { return { r: r, data: data }; }); })
        .then(function (_) {
          var r = _.r, data = _.data;
          if (typingEl && typingEl.parentNode) typingEl.remove();
          if (r.ok && data.answer != null) {
            var id = "fb-" + (++feedbackCounter);
            addMessage("assistant", data.answer, {
              sources: data.sources || [],
              latency: data.latency_seconds,
              feedbackId: id,
            });
          } else {
            addMessage("assistant", data.detail || data.error || "Sorry, something went wrong.", { feedbackId: "fb-" + (++feedbackCounter) });
          }
        })
        .catch(function (e) {
          if (typingEl && typingEl.parentNode) typingEl.remove();
          addMessage("assistant", e.message || "Network error. Please try again.");
        })
        .then(function () {
          sendBtn.disabled = false;
          inputEl.focus();
        });
    }

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", function (e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    })();
  </script>
</body>
</html>
